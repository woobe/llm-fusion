# fusion_config.yaml for llm-fusion
# API key: set OPENCODE_GO_API_KEY in your environment or ~/.hermes/.env.
# Do NOT commit secrets to version control.

fusion:
  version: "2.0.0"

  default:
    panel:
      models:
        - name: deepseek-v4-flash
          count: 3
          temp: 0.75
          top_p: 0.9
          max_completion_tokens: 800
        - name: mimo-v2.5
          count: 3
          temps: [0.6, 0.7, 0.8]
          top_p: 0.95
          max_tokens: 600
          thinking:
            type: disabled
        - name: minimax-m3
          count: 0
          temp: 0.85
          top_p: 0.9
          top_k: 40
          max_tokens: 2048
          thinking:
            type: adaptive
        - name: qwen3.7-plus
          count: 0
          temp: 0.8
          top_p: 0.92
          top_k: 20
          reasoning_effort: high
          max_tokens: 2048
        - name: deepseek-v4-pro
          count: 0
          temp: 0.9
          top_p: 0.95
          reasoning_mode: high
          max_completion_tokens: 2048
    judge:
      model: deepseek-v4-flash
      temp: 0.0
      top_p: 1.0
      stages: single
      reasoning_mode: high
      max_completion_tokens: 4000

  scenarios:
    coding:
      panel:
        deepseek:
          temp: 0.5
          max_completion_tokens: 2000
      judge:
        stages: single
        reasoning_mode: max
        max_completion_tokens: 8000
    bugfix:
      panel:
        deepseek:
          temp: 0.4
          max_completion_tokens: 2000
        mimo:
          temps: [0.4, 0.5, 0.6]
      judge:
        stages: two
        stage1:
          reasoning_mode: high
          max_completion_tokens: 4000
        stage2:
          reasoning_mode: high
          max_completion_tokens: 8000
    qa:
      panel:
        deepseek:
          temp: 0.3
          max_completion_tokens: 400
        mimo:
          temps: [0.3, 0.4, 0.5]
      judge:
        stages: single
        reasoning_mode: low
        max_completion_tokens: 2000
        max_panel_response_chars: 1200
    plan_review:
      panel:
        deepseek:
          temp: 0.6
          max_completion_tokens: 3000
        mimo:
          temps: [0.6, 0.7, 0.8]
      judge:
        stages: two
        stage1:
          reasoning_mode: high
          max_completion_tokens: 8000
        stage2:
          reasoning_mode: max
          max_completion_tokens: 12000
    creative:
      panel:
        deepseek:
          temp: 1.0
          max_completion_tokens: 4000
        mimo:
          temps: [0.8, 0.9, 1.0]
      judge:
        stages: single
        reasoning_mode: low
        temp: 0.7
        max_completion_tokens: 4000
    reasoning:
      panel:
        deepseek:
          temp: 0.5
          max_completion_tokens: 2000
        mimo:
          temps: [0.5, 0.6, 0.7]
      judge:
        stages: two
        stage1:
          reasoning_mode: max
          max_completion_tokens: 10000
        stage2:
          reasoning_mode: max
          max_completion_tokens: 12000
    document:
      panel:
        deepseek:
          temp: 0.5
          max_completion_tokens: 4000
        mimo:
          temps: [0.5, 0.6, 0.7]
      judge:
        stages: two
        stage1:
          reasoning_mode: high
          max_completion_tokens: 8000
        stage2:
          reasoning_mode: max
          max_completion_tokens: 12000
    general:
      panel:
        deepseek:
          temp: 0.75
          max_completion_tokens: 800
        mimo:
          temps: [0.6, 0.7, 0.8]
      judge:
        stages: single
        reasoning_mode: low
        max_completion_tokens: 4000
        max_panel_response_chars: 1800

  cleaning:
    profiles:
      coding:
        strip_fences: false
        strip_preamble: true
        min_words: 15
        dedup_threshold: 0.70
      bugfix:
        strip_fences: true
        strip_preamble: true
        min_words: 15
        dedup_threshold: 0.75
      qa:
        strip_fences: true
        strip_preamble: true
        min_words: 5
        dedup_threshold: 0.85
      plan_review:
        strip_fences: true
        strip_preamble: true
        min_words: 30
        dedup_threshold: 0.80
      creative:
        strip_fences: true
        strip_preamble: true
        min_words: 10
        dedup_threshold: 0.60
      reasoning:
        strip_fences: true
        strip_preamble: true
        min_words: 20
        dedup_threshold: 0.75
      document:
        strip_fences: true
        strip_preamble: true
        min_words: 30
        dedup_threshold: 0.80
      general:
        strip_fences: true
        strip_preamble: true
        min_words: 10
        dedup_threshold: 0.85

  api:
    primary:
      endpoint: "https://opencode.ai/zen/go/v1/chat/completions"
      timeout:
        panel_floor: 40
        judge_floor: 65
        panel_throughput: 25
        judge_throughput: 20
        overhead_seconds: 10
        max_timeout: 90
      retry:
        max_retries: 2
        delays_seconds: [1, 3]

  pipeline:
    default_tier: low
    max_panel_workers: 6
    min_survivors: 2
    soft_deadline_seconds: 90
    graceful_degradation: true
    express_qa:
      enabled: true
      max_chars: 120
      min_confidence: 0.85
      model: deepseek-v4-flash
      temperature: 0.0
      max_completion_tokens: 600
    retry:
      min:
        max_retries: 0
        delays_seconds: []
      low:
        max_retries: 1
        delays_seconds: [1]
      medium:
        max_retries: 1
        delays_seconds: [1]
      high:
        max_retries: 2
        delays_seconds: [1, 3]
